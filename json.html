<script>
/**
 * Chat renderer — renders parsed turns into the DOM.
 * Attaches to window.JSONLViewer.Renderer
 */
(function () {
  'use strict';

  const V = window.JSONLViewer;
  const container = () => document.getElementById('chatMessages');

  // Track tool call open state for re-renders
  const toolOpenState = new Map();

  /**
   * Format a timestamp for display.
   */
  function formatTime(ts) {
    if (!ts) return '';
    const d = new Date(ts);
    const now = new Date();
    const isToday = d.toDateString() === now.toDateString();
    if (isToday) return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    return d.toLocaleDateString([], { month: 'short', day: 'numeric' }) + ' ' +
           d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  /**
   * Format a timestamp as full datetime (tooltip).
   */
  function formatFullTime(ts) {
    if (!ts) return '';
    return new Date(ts).toLocaleString();
  }

  /**
   * Configure marked.js.
   */
  function configureMarked() {
    if (typeof marked === 'undefined') {
      // Fallback if CDN fails: basic text render
      return;
    }

    marked.setOptions({
      breaks: true,
      gfm: true,
      highlight: function (code, lang) {
        if (lang && typeof hljs !== 'undefined' && hljs.getLanguage(lang)) {
          try {
            return hljs.highlight(code, { language: lang, ignoreIllegals: true }).value;
          } catch (e) { /* fall through */ }
        }
        if (typeof hljs !== 'undefined') {
          try {
            return hljs.highlightAuto(code).value;
          } catch (e) { /* fall through */ }
        }
        return escapeHtml(code);
      },
    });

    // Custom renderer to handle code blocks with copy buttons
    const renderer = new marked.Renderer();
    renderer.code = function ({ text, lang }) {
      let highlighted;
      if (lang && typeof hljs !== 'undefined' && hljs.getLanguage(lang)) {
        try {
          highlighted = hljs.highlight(text, { language: lang, ignoreIllegals: true }).value;
        } catch (e) {
          highlighted = escapeHtml(text);
        }
      } else if (typeof hljs !== 'undefined') {
        try {
          highlighted = hljs.highlightAuto(text).value;
        } catch (e) {
          highlighted = escapeHtml(text);
        }
      } else {
        highlighted = escapeHtml(text);
      }

      const langLabel = lang || 'code';
      const blockId = 'code-' + Math.random().toString(36).substring(2, 8);

      return `<div class="code-block-wrapper">
        <div class="code-block-header">
          <span class="code-block-lang">${escapeHtml(langLabel)}</span>
          <button class="code-block-copy" onclick="JSONLViewer.Renderer.copyCode('${blockId}')">Copy</button>
        </div>
        <pre><code id="${blockId}">${highlighted}</code></pre>
      </div>`;
    };

    marked.use({ renderer });
  }

  /**
   * Escape HTML.
   */
  function escapeHtml(str) {
    const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' };
    return String(str).replace(/[&<>"']/g, c => map[c]);
  }

  /**
   * Copy code block content to clipboard.
   */
  function copyCode(blockId) {
    const el = document.getElementById(blockId);
    if (!el) return;
    const text = el.textContent;
    navigator.clipboard.writeText(text).then(() => {
      const btn = el.closest('.code-block-wrapper').querySelector('.code-block-copy');
      if (btn) {
        btn.textContent = 'Copied!';
        setTimeout(() => { btn.textContent = 'Copy'; }, 1500);
      }
    }).catch(() => {
      // Fallback
      const ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    });
  }

  /**
   * Render Markdown text to HTML.
   */
  function renderMarkdown(text) {
    if (typeof marked !== 'undefined') {
      try {
        return marked.parse(text);
      } catch (e) {
        console.warn('Markdown parse error:', e);
      }
    }
    // Fallback: basic text with paragraph breaks
    return '<p>' + escapeHtml(text).replace(/\n\n/g, '</p><p>').replace(/\n/g, '<br>') + '</p>';
  }

  /**
   * Render a single content block (text, tool_use, thinking).
   */
  function renderContentBlock(block) {
    if (block.type === 'text' && block.text) {
      return `<div class="msg-content">${renderMarkdown(block.text)}</div>`;
    }

    if (block.type === 'thinking' && block.thinking) {
      const id = 'thinking-' + Math.random().toString(36).substring(2, 8);
      return `<div class="thinking-block" id="${id}">
        <button class="thinking-header" onclick="JSONLViewer.Renderer.toggleCollapsible('${id}')">
          <svg class="thinking-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
          💭 Thinking
        </button>
        <div class="thinking-body">${renderMarkdown(block.thinking)}</div>
      </div>`;
    }

    if (block.type === 'tool_use') {
      const id = 'tool-' + Math.random().toString(36).substring(2, 8);
      let inputStr = '';
      try {
        inputStr = JSON.stringify(block.input, null, 2);
      } catch (e) {
        inputStr = String(block.input || '');
      }

      const wasOpen = toolOpenState.get(block.id);
      const openClass = wasOpen ? ' open' : '';

      let resultHtml = '';
      if (block._result) {
        const r = block._result;
        const resultContent = typeof r.content === 'string' ? r.content : JSON.stringify(r.content, null, 2);
        const errorClass = r.isError ? ' error' : '';
        resultHtml = `<div class="tool-result-block${openClass}">
          <button class="tool-result-header" onclick="JSONLViewer.Renderer.toggleCollapsible(this.parentElement)">
            <svg class="thinking-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="9 18 15 12 9 6"/>
            </svg>
            Result${r.isError ? ' ❌ (error)' : ''}
          </button>
          <div class="tool-result-content">
            <pre>${escapeHtml(resultContent)}</pre>
          </div>
        </div>`;
      }

      return `<div class="tool-call-block${openClass}" id="${id}">
        <button class="tool-call-header" onclick="JSONLViewer.Renderer.toggleToolCall('${id}', '${escapeHtml(block.id)}')">
          <svg class="thinking-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
          <span class="tool-call-icon">🔧</span>
          <span class="tool-call-name">${escapeHtml(block.name)}</span>
        </button>
        <div class="tool-call-body">
          <div class="tool-call-section">
            <div class="tool-call-section-label">Input</div>
            <pre>${escapeHtml(inputStr)}</pre>
          </div>
          ${resultHtml}
        </div>
      </div>`;
    }

    return '';
  }

  /**
   * Toggle a collapsible element.
   */
  function toggleCollapsible(el) {
    if (typeof el === 'string') {
      el = document.getElementById(el);
    }
    if (!el) return;
    el.classList.toggle('open');
  }

  /**
   * Toggle a tool call block and remember state.
   */
  function toggleToolCall(blockId, toolUseId) {
    const el = document.getElementById(blockId);
    if (!el) return;
    el.classList.toggle('open');

    // Remember open state
    const isOpen = el.classList.contains('open');
    if (isOpen) {
      toolOpenState.set(toolUseId, true);
    } else {
      toolOpenState.delete(toolUseId);
    }
  }

  /**
   * Render a single turn.
   */
  function renderTurn(turn) {
    const roleClass = turn.role === 'user' ? 'turn-user'
                    : turn.role === 'assistant' ? 'turn-assistant'
                    : 'turn-system';
    const roleLabel = turn.role === 'user'
                    ? (turn.isQueued ? 'You (mid-turn)' : 'You')
                    : turn.role === 'assistant' ? (turn.agentId || 'Claude')
                    : 'System';
    const ts = formatTime(turn.timestamp);
    const fullTs = formatFullTime(turn.timestamp);
    const modelLabel = turn.model ? ` · ${turn.model.split('-').slice(0, 3).join('-')}` : '';

    let html = `<div class="turn ${roleClass}" data-role="${turn.role}" data-turn-id="${turn.id}">
      <div class="msg-meta">
        <span class="msg-role">${escapeHtml(roleLabel)}</span>
        ${modelLabel ? `<span class="msg-model">${escapeHtml(modelLabel)}</span>` : ''}
        ${ts ? `<span class="msg-time" title="${escapeHtml(fullTs)}">${escapeHtml(ts)}</span>` : ''}
      </div>
      <div class="msg-bubble">`;

    const content = turn.content;

    if (typeof content === 'string') {
      html += `<div class="msg-content">${renderMarkdown(content)}</div>`;
    } else if (Array.isArray(content)) {
      for (const block of content) {
        html += renderContentBlock(block);
      }
    }

    html += `</div></div>`;
    return html;
  }

  /**
   * Clear all rendered content.
   */
  function clear() {
    const el = container();
    if (el) el.innerHTML = '';
    toolOpenState.clear();
  }

  /**
   * Render the full conversation.
   */
  function renderConversation(turns) {
    const el = container();
    if (!el) return;

    toolOpenState.clear();
    let html = '';

    for (const turn of turns) {
      html += renderTurn(turn);
    }

    el.innerHTML = html;
  }

  /**
   * Scroll to a specific turn (for search navigation).
   */
  function scrollToTurn(turnIndex) {
    const el = container();
    if (!el) return;

    const turns = el.querySelectorAll('.turn');
    if (turnIndex >= 0 && turnIndex < turns.length) {
      const target = turns[turnIndex];
      target.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }

  /**
   * Highlight search matches in the rendered content.
   */
  function highlightSearch(query, currentIndex) {
    if (!query || query.length < 2) return;

    const el = container();
    if (!el) return;

    // Remove existing highlights
    el.querySelectorAll('.search-highlight').forEach(s => {
      const parent = s.parentNode;
      parent.replaceChild(document.createTextNode(s.textContent), s);
    });

    // Highlight matches in text nodes within message bubbles
    const bubbles = el.querySelectorAll('.msg-bubble');
    const state = { current: 0 };

    for (const bubble of bubbles) {
      highlightTextNodes(bubble, query, currentIndex, state);
    }
  }

  function highlightTextNodes(node, query, targetIndex, state) {
    if (node.nodeType === Node.TEXT_NODE) {
      const text = node.textContent;
      const lower = text.toLowerCase();
      const lowerQuery = query.toLowerCase();
      let idx = 0;
      let result = '';
      let lastIdx = 0;

      while ((idx = lower.indexOf(lowerQuery, idx)) !== -1) {
        result += escapeHtml(text.substring(lastIdx, idx));
        const isCurrent = state.current === targetIndex;
        const currentClass = isCurrent ? ' current' : '';
        result += `<mark class="search-highlight${currentClass}">${escapeHtml(text.substring(idx, idx + query.length))}</mark>`;
        state.current++;
        idx += query.length;
        lastIdx = idx;
      }
      result += escapeHtml(text.substring(lastIdx));

      if (result !== text) {
        const span = document.createElement('span');
        span.innerHTML = result;
        node.parentNode.replaceChild(span, node);
      }
    } else if (node.nodeType === Node.ELEMENT_NODE) {
      // Skip fenced code blocks and tool/thinking wrappers, but allow inline <code>
      if (node.matches('pre, .code-block-wrapper, .tool-call-block, .thinking-block')) {
        return;
      }
      for (const child of [...node.childNodes]) {
        highlightTextNodes(child, query, targetIndex, state);
      }
    }
  }

  /**
   * Re-render after search clear.
   */
  function clearHighlights() {
    const el = container();
    if (!el) return;
    el.querySelectorAll('.search-highlight').forEach(s => {
      const parent = s.parentNode;
      if (parent) {
        parent.replaceChild(document.createTextNode(s.textContent), s);
      }
    });
  }

  // Initialize marked configuration
  configureMarked();

  window.JSONLViewer = window.JSONLViewer || {};
  window.JSONLViewer.Renderer = {
    renderConversation,
    clear,
    scrollToTurn,
    highlightSearch,
    clearHighlights,
    renderMarkdown,
    escapeHtml,
    copyCode,
    toggleCollapsible,
    toggleToolCall,
  };
})();

</script>
<script>
/**
 * File Browser — lets the user open a whole folder (e.g. ~/.claude/projects)
 * and browse its .jsonl sessions from a sidebar, instead of picking one
 * file at a time.
 *
 * Uses the File System Access API (window.showDirectoryPicker), which is
 * only available in Chromium browsers (Chrome/Edge). No directory handles
 * are persisted across reloads — every "Open Folder" click starts fresh.
 *
 * Attaches to window.JSONLViewer.FileBrowser
 */
(function () {
  'use strict';

  const MAX_DEPTH = 3;          // how many directory levels deep to scan
  const TITLE_PEEK_BYTES = 65536; // read only the first 64KB when deriving a title

  // ── DOM refs ──────────────────────────────────────────────────────
  const dom = {};
  function cacheDom() {
    dom.btnOpenFolder = document.getElementById('btnOpenFolder');
    dom.btnOpenFolderEmpty = document.getElementById('btnOpenFolderEmpty');
    dom.sidebar = document.getElementById('sessionSidebar');
    dom.sidebarList = document.getElementById('sidebarList');
    dom.btnSidebarToggle = document.getElementById('btnSidebarToggle');
    dom.toastContainer = document.getElementById('toastContainer');
  }

  // ── Toast (self-contained copy — same #toastContainer as app.js) ──
  function showToast(message, type) {
    if (type === void 0) type = '';
    if (!dom.toastContainer) return;
    const toast = document.createElement('div');
    toast.className = 'toast ' + type;
    toast.textContent = message;
    dom.toastContainer.appendChild(toast);
    setTimeout(() => {
      if (toast.parentNode) toast.parentNode.removeChild(toast);
    }, 3000);
  }

  // Note: all session/file/project names are inserted via textContent
  // (never innerHTML) below, so they can never break out of their element —
  // no separate escapeHtml() call is needed for the DOM built in this file.

  // ── Fixed inline-SVG icon templates (no disk-derived data inside them,
  // so building them via innerHTML is safe — matches the pattern already
  // used for the .thinking-chevron icon elsewhere in the app) ──────────
  const FOLDER_ICON_MARKUP =
    '<svg class="sidebar-group-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">' +
    '<path d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V7z"/></svg>';
  const CHEVRON_ICON_MARKUP =
    '<svg class="sidebar-group-chevron thinking-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">' +
    '<polyline points="9 18 15 12 9 6"/></svg>';

  /** Build a DOM node from a fixed, trusted SVG template string. */
  function iconFromTemplate(markup) {
    const template = document.createElement('template');
    template.innerHTML = markup;
    return template.content.firstChild;
  }

  // ── Directory scanning ──────────────────────────────────────────────

  /**
   * Recursively walk a directory handle (depth-limited) collecting
   * .jsonl file handles. `pathParts` are the directory names traversed
   * so far, relative to the picked root (root itself is not included).
   */
  async function scanDirectory(dirHandle, depth, pathParts, out) {
    if (depth > MAX_DEPTH) return;
    for await (const entry of dirHandle.values()) {
      if (entry.kind === 'file') {
        if (entry.name.toLowerCase().endsWith('.jsonl')) {
          out.push({ handle: entry, pathParts: pathParts });
        }
      } else if (entry.kind === 'directory') {
        await scanDirectory(entry, depth + 1, pathParts.concat(entry.name), out);
      }
    }
  }

  /**
   * Derive a title for a session file by peeking at only its first 64KB.
   * Priority:
   *   1. First line that JSON-parses to {type:"summary", summary:"..."}
   *   2. First user event with string message.content not starting with "<"
   *      (first 80 chars)
   *   3. null (caller falls back to the filename stem)
   */
  async function computeTitle(file) {
    let text;
    try {
      const slice = file.slice(0, TITLE_PEEK_BYTES);
      text = await slice.text();
    } catch (e) {
      return null;
    }

    const lines = text.split(/\r?\n/);
    let summaryTitle = null;
    let userTitle = null;

    for (let i = 0; i < lines.length; i++) {
      const line = lines[i].trim();
      if (!line) continue;
      let obj;
      try {
        obj = JSON.parse(line);
      } catch (e) {
        continue; // last line in the 64KB slice is often cut off mid-JSON — expected
      }

      if (summaryTitle === null && obj && obj.type === 'summary' &&
          typeof obj.summary === 'string' && obj.summary.trim().length > 0) {
        summaryTitle = obj.summary.trim();
      }

      if (userTitle === null && obj && obj.type === 'user' && obj.message &&
          typeof obj.message.content === 'string') {
        const content = obj.message.content;
        if (content.length > 0 && content[0] !== '<') {
          const trimmed = content.trim();
          if (trimmed.length > 0) userTitle = trimmed.slice(0, 80);
        }
      }
    }

    return summaryTitle || userTitle || null;
  }

  /**
   * Trim the encoded project-directory name down to something readable.
   * Encoded names look like "C--Users-maddy-Documents-website-jsonl-conversation"
   * (path separators/colons replaced with "-"). We only strip the leading
   * "<drive>--Users-<username>-" prefix when it's clearly recognizable —
   * anything else is shown as-is rather than risk a lossy, wrong decode
   * (dashes also legitimately appear inside real directory names).
   */
  function displayProjectName(encodedName) {
    const m = encodedName.match(/^[A-Za-z]--Users-[^-]+-(.+)$/);
    return m ? m[1] : encodedName;
  }

  function formatSize(bytes) {
    if (bytes >= 1024 * 1024) return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    if (bytes >= 1024) return (bytes / 1024).toFixed(0) + ' KB';
    return bytes + ' B';
  }

  function formatDate(ts) {
    const d = new Date(ts);
    if (isNaN(d.getTime())) return '';
    const now = new Date();
    const sameDay = d.getFullYear() === now.getFullYear() &&
      d.getMonth() === now.getMonth() &&
      d.getDate() === now.getDate();
    if (sameDay) {
      const hh = String(d.getHours()).padStart(2, '0');
      const mm = String(d.getMinutes()).padStart(2, '0');
      return hh + ':' + mm;
    }
    return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
  }

  // ── State ────────────────────────────────────────────────────────
  let activeItemEl = null;

  function setActiveItem(el) {
    if (activeItemEl && activeItemEl !== el) activeItemEl.classList.remove('active');
    activeItemEl = el;
    if (el) el.classList.add('active');
  }

  function clearActive() {
    if (activeItemEl) activeItemEl.classList.remove('active');
    activeItemEl = null;
  }

  function setSidebarVisible(visible) {
    if (!dom.sidebar) return;
    dom.sidebar.style.display = visible ? '' : 'none';
  }

  function toggleSidebarCollapsed() {
    if (!dom.sidebar) return;
    dom.sidebar.classList.toggle('collapsed');
  }

  // ── Rendering ────────────────────────────────────────────────────

  function renderSidebar(sessions) {
    dom.sidebarList.innerHTML = '';

    if (sessions.length === 0) {
      const hint = document.createElement('div');
      hint.className = 'sidebar-empty-hint';
      hint.textContent = 'No .jsonl sessions found in that folder.';
      dom.sidebarList.appendChild(hint);
      setSidebarVisible(true);
      return;
    }

    // Group by project
    const groups = new Map(); // key -> { name, sessions: [] }
    for (const s of sessions) {
      if (!groups.has(s.group)) {
        groups.set(s.group, { name: s.group, sessions: [] });
      }
      groups.get(s.group).sessions.push(s);
    }

    // Sort sessions within each group, newest first
    const groupList = Array.from(groups.values());
    groupList.forEach(g => {
      g.sessions.sort((a, b) => b.lastModified - a.lastModified);
      g.mostRecent = g.sessions.length ? g.sessions[0].lastModified : 0;
    });

    // Sort groups by their most recent session, newest first
    groupList.sort((a, b) => b.mostRecent - a.mostRecent);

    // Only the group holding the single most-recently-modified session
    // starts expanded (groupList[0], since it's sorted newest-first) —
    // everything else starts collapsed so a long project list stays scannable.
    groupList.forEach((g, index) => {
      const groupEl = document.createElement('div');
      groupEl.className = 'sidebar-group' + (index === 0 ? ' open' : '');

      const groupHeader = document.createElement('button');
      groupHeader.type = 'button';
      groupHeader.className = 'sidebar-group-header';
      const label = displayProjectName(g.name);
      groupHeader.title = g.name;
      groupHeader.appendChild(iconFromTemplate(CHEVRON_ICON_MARKUP));
      groupHeader.appendChild(iconFromTemplate(FOLDER_ICON_MARKUP));
      const nameEl = document.createElement('span');
      nameEl.className = 'sidebar-group-name';
      nameEl.textContent = label; // textContent — safe from HTML injection
      groupHeader.appendChild(nameEl);
      const badgeEl = document.createElement('span');
      badgeEl.className = 'sidebar-group-badge';
      badgeEl.textContent = String(g.sessions.length);
      groupHeader.appendChild(badgeEl);
      groupHeader.addEventListener('click', () => {
        groupEl.classList.toggle('open');
      });
      groupEl.appendChild(groupHeader);

      const sessionsOuter = document.createElement('div');
      sessionsOuter.className = 'sidebar-group-sessions';
      const sessionsInner = document.createElement('div');
      sessionsInner.className = 'sidebar-group-sessions-inner';

      for (const s of g.sessions) {
        const item = document.createElement('div');
        item.className = 'sidebar-item';
        item.dataset.sessionId = s.id;

        const titleEl = document.createElement('div');
        titleEl.className = 'sidebar-item-title';
        titleEl.textContent = s.title; // textContent — safe from HTML injection
        titleEl.title = s.title;

        const metaEl = document.createElement('div');
        metaEl.className = 'sidebar-item-meta';
        const dateSpan = document.createElement('span');
        dateSpan.className = 'sidebar-item-date';
        dateSpan.textContent = formatDate(s.lastModified);
        const sizeSpan = document.createElement('span');
        sizeSpan.className = 'sidebar-item-size';
        sizeSpan.textContent = formatSize(s.size);
        metaEl.appendChild(dateSpan);
        metaEl.appendChild(sizeSpan);

        item.appendChild(titleEl);
        item.appendChild(metaEl);

        item.addEventListener('click', () => selectSession(s, item));

        sessionsInner.appendChild(item);
      }

      sessionsOuter.appendChild(sessionsInner);
      groupEl.appendChild(sessionsOuter);
      dom.sidebarList.appendChild(groupEl);
    });

    setSidebarVisible(true);
  }

  async function selectSession(session, itemEl) {
    const V = window.JSONLViewer;
    try {
      setActiveItem(itemEl);
      if (V.App && typeof V.App.showLoading === 'function') V.App.showLoading();
      const file = await session.handle.getFile();
      const text = await file.text();
      if (V.App && typeof V.App.loadText === 'function') {
        V.App.loadText(text, file.name);
      }
    } catch (err) {
      console.error('[FileBrowser] Failed to open session:', err);
      showToast('Failed to open session: ' + (err && err.message ? err.message : 'unknown error'), 'error');
    }
  }

  // ── Scan + build session list ───────────────────────────────────

  async function scanAndRender(rootHandle) {
    let matches = [];
    try {
      await scanDirectory(rootHandle, 1, [], matches);
    } catch (err) {
      console.error('[FileBrowser] Scan failed:', err);
      showToast('Failed to scan folder: ' + (err && err.message ? err.message : 'unknown error'), 'error');
      return;
    }

    if (matches.length === 0) {
      showToast('No .jsonl files found in that folder (searched 3 levels deep).', 'error');
      return;
    }

    const sessions = [];
    for (let i = 0; i < matches.length; i++) {
      const m = matches[i];
      let file;
      try {
        file = await m.handle.getFile();
      } catch (e) {
        console.warn('[FileBrowser] Skipping unreadable file', m.handle.name, e);
        continue;
      }

      const group = m.pathParts.length === 0 ? rootHandle.name : m.pathParts[0];
      let title = null;
      try {
        title = await computeTitle(file);
      } catch (e) {
        title = null;
      }
      if (!title) title = file.name.replace(/\.jsonl$/i, '');

      sessions.push({
        id: group + '/' + m.pathParts.join('/') + '/' + file.name,
        handle: m.handle,
        name: file.name,
        size: file.size,
        lastModified: file.lastModified,
        group: group,
        title: title,
      });
    }

    renderSidebar(sessions);
  }

  // ── Open folder entry point ─────────────────────────────────────

  async function openFolder() {
    if (typeof window.showDirectoryPicker !== 'function') {
      showToast('Opening a folder needs Chrome or Edge.', 'error');
      return;
    }

    let dirHandle;
    try {
      dirHandle = await window.showDirectoryPicker();
    } catch (err) {
      if (err && err.name === 'AbortError') return; // user cancelled — stay silent
      console.error('[FileBrowser] Directory pick failed:', err);
      showToast('Could not open folder: ' + (err && err.message ? err.message : 'unknown error'), 'error');
      return;
    }

    clearActive();
    await scanAndRender(dirHandle);
  }

  // ── Init ─────────────────────────────────────────────────────────

  function init() {
    cacheDom();

    if (dom.btnOpenFolder) dom.btnOpenFolder.addEventListener('click', openFolder);
    if (dom.btnOpenFolderEmpty) dom.btnOpenFolderEmpty.addEventListener('click', openFolder);
    if (dom.btnSidebarToggle) dom.btnSidebarToggle.addEventListener('click', toggleSidebarCollapsed);
  }

  window.JSONLViewer = window.JSONLViewer || {};
  window.JSONLViewer.FileBrowser = {
    init: init,
    clearActive: clearActive,
  };
})();

</script>
<script>
/**
 * Main application controller.
 * Wires together parser, renderer, search, export, and theme.
 */
(function () {
  'use strict';

  const V = window.JSONLViewer;

  // ── State ─────────────────────────────────────────────────────────
  let currentParsed = null;   // Result from Parser.parse()
  let searchEngine = null;    // SearchEngine instance
  let pendingExportFormat = null;  // Format selected for export (before filter modal)

  // ── DOM refs ──────────────────────────────────────────────────────
  const dom = {};
  function cacheDom() {
    dom.emptyState = document.getElementById('emptyState');
    dom.loadingState = document.getElementById('loadingState');
    dom.chatContainer = document.getElementById('chatContainer');
    dom.chatMessages = document.getElementById('chatMessages');
    dom.sessionBar = document.getElementById('sessionBar');
    dom.sessionModel = document.getElementById('sessionModel');
    dom.sessionStats = document.getElementById('sessionStats');
    dom.sessionFile = document.getElementById('sessionFile');
    dom.fileInput = document.getElementById('fileInput');
    dom.btnUpload = document.getElementById('btnUpload');
    dom.btnUploadEmpty = document.getElementById('btnUploadEmpty');
    dom.btnExport = document.getElementById('btnExport');
    dom.exportMenu = document.getElementById('exportMenu');
    dom.btnTheme = document.getElementById('btnTheme');
    dom.searchContainer = document.getElementById('searchContainer');
    dom.searchInput = document.getElementById('searchInput');
    dom.searchMeta = document.getElementById('searchMeta');
    dom.searchPrev = document.getElementById('searchPrev');
    dom.searchNext = document.getElementById('searchNext');
    dom.searchClear = document.getElementById('searchClear');
    dom.toastContainer = document.getElementById('toastContainer');
    dom.exportFilterModal = document.getElementById('exportFilterModal');
    dom.exportFormatLabel = document.getElementById('exportFormatLabel');
    dom.btnExportConfirm = document.getElementById('btnExportConfirm');
    dom.btnExportCancel = document.getElementById('btnExportCancel');
    dom.btnPresetAll = document.getElementById('btnPresetAll');
    dom.btnPresetConvo = document.getElementById('btnPresetConvo');
  }

  // ── UI State Helpers ──────────────────────────────────────────────

  /**
   * Reset the search UI back to its empty state (input, meta label,
   * prev/next buttons, clear button). Does not touch the search engine.
   */
  function resetSearchUI() {
    dom.searchInput.value = '';
    dom.searchMeta.textContent = '';
    dom.searchPrev.disabled = true;
    dom.searchNext.disabled = true;
    dom.searchClear.style.display = 'none';
  }

  function showEmpty() {
    dom.emptyState.style.display = '';
    dom.loadingState.style.display = 'none';
    dom.chatContainer.style.display = 'none';
    dom.sessionBar.style.display = 'none';
    dom.btnExport.disabled = true;
    dom.searchInput.disabled = true;
    resetSearchUI();
  }

  function showLoading() {
    dom.emptyState.style.display = 'none';
    dom.loadingState.style.display = '';
    dom.chatContainer.style.display = 'none';
    dom.sessionBar.style.display = 'none';
  }

  function showChat() {
    dom.emptyState.style.display = 'none';
    dom.loadingState.style.display = 'none';
    dom.chatContainer.style.display = '';
    dom.sessionBar.style.display = '';
    dom.btnExport.disabled = false;
    dom.searchInput.disabled = false;
  }

  function updateSessionBar(filename) {
    if (!currentParsed) return;

    const models = currentParsed.models ? [...currentParsed.models] : [];
    dom.sessionModel.textContent = models.length > 0
      ? models.map(m => {
          // Shorten model names for display
          return m.replace('claude-', '').replace(/-\d{8}$/, '');
        }).join(', ')
      : 'Unknown model';

    const tokens = currentParsed.totalTokens || 0;
    if (tokens > 1_000_000) {
      dom.sessionStats.textContent = `${(tokens / 1_000_000).toFixed(1)}M tokens`;
    } else if (tokens > 1_000) {
      dom.sessionStats.textContent = `${(tokens / 1_000).toFixed(0)}k tokens`;
    } else if (tokens > 0) {
      dom.sessionStats.textContent = `${tokens} tokens`;
    }

    dom.sessionStats.textContent += ` · ${currentParsed.turns.length} turns`;

    if (filename) {
      dom.sessionFile.textContent = filename;
    }
  }

  function showToast(message, type) {
    if (type === void 0) type = '';
    const toast = document.createElement('div');
    toast.className = 'toast ' + type;
    toast.textContent = message;
    dom.toastContainer.appendChild(toast);
    setTimeout(() => {
      if (toast.parentNode) toast.parentNode.removeChild(toast);
    }, 3000);
  }

  // ── File Loading ──────────────────────────────────────────────────

  /**
   * Load a file picked via the file input or drag & drop.
   * Reads it with FileReader, then hands the text off to loadText().
   */
  function loadFile(file) {
    if (!file) return;

    // Validate extension
    if (!file.name.toLowerCase().endsWith('.jsonl')) {
      showToast('Please select a .jsonl file', 'error');
      return;
    }

    // This is a non-sidebar load — clear any highlighted session in the
    // file browser sidebar so it doesn't look stale/misleading.
    if (V.FileBrowser && typeof V.FileBrowser.clearActive === 'function') {
      V.FileBrowser.clearActive();
    }

    showLoading();

    const reader = new FileReader();
    reader.onload = function (e) {
      try {
        const text = e.target.result;
        loadText(text, file.name);
      } catch (err) {
        console.error('Read error:', err);
        showEmpty();
        showToast('Failed to read file: ' + err.message, 'error');
      }
    };

    reader.onerror = function () {
      showEmpty();
      showToast('Failed to read file', 'error');
    };

    reader.readAsText(file);
  }

  /**
   * Parse and render already-in-memory JSONL text (shared by the
   * file-input/drag-drop path and the file-browser sidebar path).
   */
  function loadText(text, filename) {
    showLoading();

    // Use setTimeout to let the loading state render before heavy parsing
    setTimeout(() => {
      try {
        const parsed = V.Parser.parse(text);
        currentParsed = parsed;

        if (parsed.turns.length === 0) {
          showEmpty();
          const rawCount = parsed.rawEvents ? parsed.rawEvents.length : 0;
          showToast('No conversation messages found. ' + rawCount + ' raw events parsed — check browser console (F12) for debug info.', 'error');
          return;
        }

        // Initialize search
        searchEngine = new V.SearchEngine();
        searchEngine.setTurns(parsed.turns);

        // Render
        V.Renderer.renderConversation(parsed.turns);
        showChat();
        updateSessionBar(filename);

        // Scroll to top
        dom.chatContainer.scrollTop = 0;

        // Clear search
        resetSearchUI();

        showToast(`Loaded ${parsed.turns.length} turns · ${[...parsed.models].join(', ')}`);
      } catch (err) {
        console.error('Parse error:', err);
        showEmpty();
        showToast('Failed to parse conversation: ' + err.message, 'error');
      }
    }, 50);
  }

  function openFileDialog() {
    dom.fileInput.click();
  }

  // ── Search ────────────────────────────────────────────────────────
  function doSearch() {
    if (!searchEngine || !currentParsed) return;

    const query = dom.searchInput.value.trim();

    if (query.length < 2) {
      // Clear highlights
      V.Renderer.clearHighlights();
      dom.searchMeta.textContent = '';
      dom.searchPrev.disabled = true;
      dom.searchNext.disabled = true;
      dom.searchClear.style.display = 'none';
      return;
    }

    dom.searchClear.style.display = '';
    searchEngine.search(query);

    if (searchEngine.hasResults()) {
      dom.searchMeta.textContent = `${searchEngine.currentIndex + 1}/${searchEngine.results.length}`;
      dom.searchPrev.disabled = false;
      dom.searchNext.disabled = false;

      // Navigate to first result
      const result = searchEngine.current();
      if (result) {
        V.Renderer.scrollToTurn(result.turnIndex);
        // Apply highlights after scroll
        setTimeout(() => {
          V.Renderer.highlightSearch(query, searchEngine.currentIndex);
        }, 100);
      }
    } else {
      dom.searchMeta.textContent = '0/0';
      dom.searchPrev.disabled = true;
      dom.searchNext.disabled = true;
      V.Renderer.clearHighlights();
    }
  }

  function searchNext() {
    if (!searchEngine || !searchEngine.hasResults()) return;

    const result = searchEngine.next();
    if (result) {
      V.Renderer.scrollToTurn(result.turnIndex);
      dom.searchMeta.textContent = `${searchEngine.currentIndex + 1}/${searchEngine.results.length}`;
      setTimeout(() => {
        V.Renderer.highlightSearch(searchEngine.query, searchEngine.currentIndex);
      }, 100);
    }
  }

  function searchPrev() {
    if (!searchEngine || !searchEngine.hasResults()) return;

    const result = searchEngine.prev();
    if (result) {
      V.Renderer.scrollToTurn(result.turnIndex);
      dom.searchMeta.textContent = `${searchEngine.currentIndex + 1}/${searchEngine.results.length}`;
      setTimeout(() => {
        V.Renderer.highlightSearch(searchEngine.query, searchEngine.currentIndex);
      }, 100);
    }
  }

  function clearSearch() {
    resetSearchUI();
    V.Renderer.clearHighlights();
    if (searchEngine) searchEngine.clear();
    dom.searchInput.focus();
  }

  // ── Export ────────────────────────────────────────────────────────
  function toggleExportMenu() {
    if (!currentParsed) {
      showToast('No conversation loaded', 'error');
      return;
    }
    dom.exportMenu.classList.toggle('open');
  }

  /**
   * User clicked a format in the dropdown. Show the filter modal.
   */
  function doExport(format) {
    dom.exportMenu.classList.remove('open');

    if (!currentParsed) {
      showToast('No conversation loaded', 'error');
      return;
    }

    pendingExportFormat = format;

    var formatLabels = { md: 'Markdown (.md)', pdf: 'PDF (.pdf)', dxt: 'DXT (.dxt)' };
    dom.exportFormatLabel.textContent = formatLabels[format] || format;

    if (dom.exportFilterModal) {
      dom.exportFilterModal.style.display = '';
    } else {
      showToast('Export error: modal not found', 'error');
    }
  }

  /**
   * Preset: check every filter checkbox ("Everything").
   */
  function applyPresetAll() {
    var checkboxes = dom.exportFilterModal.querySelectorAll('input[data-filter]');
    checkboxes.forEach(function (cb) { cb.checked = true; });
  }

  /**
   * Preset: check only "text" and uncheck the rest ("Conversation only").
   */
  function applyPresetConversationOnly() {
    var checkboxes = dom.exportFilterModal.querySelectorAll('input[data-filter]');
    checkboxes.forEach(function (cb) { cb.checked = (cb.dataset.filter === 'text'); });
  }

  /**
   * Read the filter checkboxes and return a filters config object.
   */
  function readExportFilters() {
    var checkboxes = dom.exportFilterModal.querySelectorAll('input[data-filter]');
    var filters = {};
    for (var i = 0; i < checkboxes.length; i++) {
      var cb = checkboxes[i];
      filters[cb.dataset.filter] = cb.checked;
    }
    return filters;
  }

  /**
   * Execute the pending export with the selected filters.
   */
  function confirmExport() {
    // Hide modal safely
    if (dom.exportFilterModal) {
      dom.exportFilterModal.style.display = 'none';
    }

    if (!pendingExportFormat || !currentParsed) {
      return;
    }

    var data = V.Parser.toExportData(currentParsed);
    var filters = readExportFilters();

    try {
      switch (pendingExportFormat) {
        case 'md':
          V.Exporter.exportMarkdown(data, filters);
          showToast('Exported as Markdown');
          break;
        case 'pdf':
          V.Exporter.exportPDF(data, filters);
          showToast('Opening print dialog for PDF export…');
          break;
        case 'dxt':
          V.Exporter.exportDXT(data, filters);
          showToast('Exported as DXT');
          break;
        default:
          showToast('Unknown export format', 'error');
      }
    } catch (err) {
      console.error('[Export] Error:', err);
      showToast('Export failed: ' + err.message, 'error');
    }

    pendingExportFormat = null;
  }

  /**
   * Cancel the export filter modal.
   */
  function cancelExport() {
    if (dom.exportFilterModal) {
      dom.exportFilterModal.style.display = 'none';
    }
    pendingExportFormat = null;
  }

  // ── Drag & Drop ───────────────────────────────────────────────────
  function setupDragDrop() {
    const main = document.querySelector('.app-main');

    ['dragenter', 'dragover'].forEach(evt => {
      main.addEventListener(evt, (e) => {
        e.preventDefault();
        e.stopPropagation();
        main.classList.add('drag-over');
      });
    });

    ['dragleave', 'drop'].forEach(evt => {
      main.addEventListener(evt, (e) => {
        e.preventDefault();
        e.stopPropagation();
        main.classList.remove('drag-over');
      });
    });

    main.addEventListener('drop', (e) => {
      const files = e.dataTransfer.files;
      if (files.length > 0) {
        loadFile(files[0]);
      }
    });

    // Also allow drop on the empty state
    dom.emptyState.addEventListener('click', (e) => {
      // Only open file dialog if clicking the empty state (not its buttons)
      if (e.target === dom.emptyState || e.target.closest('.empty-icon') || e.target.tagName === 'H2' || e.target.tagName === 'P') {
        openFileDialog();
      }
    });
  }

  // ── Keyboard Shortcuts ────────────────────────────────────────────
  function setupKeyboard() {
    document.addEventListener('keydown', (e) => {
      // Ctrl/Cmd + K → focus search
      if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
        e.preventDefault();
        dom.searchInput.focus();
        return;
      }

      // Ctrl/Cmd + O → open file
      if ((e.ctrlKey || e.metaKey) && e.key === 'o') {
        e.preventDefault();
        openFileDialog();
        return;
      }

      // Escape → clear search (unless the export filter modal is open —
      // its own Escape handler takes priority and closes it instead)
      if (e.key === 'Escape' && document.activeElement === dom.searchInput) {
        if (dom.exportFilterModal && dom.exportFilterModal.style.display !== 'none') {
          return;
        }
        clearSearch();
        return;
      }

      // Enter in search → next result
      if (e.key === 'Enter' && document.activeElement === dom.searchInput) {
        if (e.shiftKey) {
          e.preventDefault();
          searchPrev();
        } else {
          e.preventDefault();
          searchNext();
        }
        return;
      }
    });
  }

  // ── Event Bindings ────────────────────────────────────────────────
  function bindEvents() {
    // File input
    dom.fileInput.addEventListener('change', (e) => {
      if (e.target.files.length > 0) {
        loadFile(e.target.files[0]);
      }
    });
    dom.btnUpload.addEventListener('click', openFileDialog);
    dom.btnUploadEmpty.addEventListener('click', openFileDialog);

    // Export
    dom.btnExport.addEventListener('click', toggleExportMenu);
    dom.exportMenu.querySelectorAll('button').forEach(btn => {
      btn.addEventListener('click', () => doExport(btn.dataset.format));
    });

    // Close export menu on outside click
    document.addEventListener('click', (e) => {
      if (!dom.exportMenu.contains(e.target) && !dom.btnExport.contains(e.target)) {
        dom.exportMenu.classList.remove('open');
      }
    });

    // Export filter modal
    dom.btnExportConfirm.addEventListener('click', confirmExport);
    dom.btnExportCancel.addEventListener('click', cancelExport);
    if (dom.btnPresetAll) dom.btnPresetAll.addEventListener('click', applyPresetAll);
    if (dom.btnPresetConvo) dom.btnPresetConvo.addEventListener('click', applyPresetConversationOnly);

    // Close modal on overlay click
    dom.exportFilterModal.addEventListener('click', function (e) {
      if (e.target === dom.exportFilterModal) cancelExport();
    });

    // Close modal on Escape
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape' && dom.exportFilterModal.style.display !== 'none') {
        cancelExport();
      }
    });

    // Search
    dom.searchInput.addEventListener('input', doSearch);
    dom.searchNext.addEventListener('click', searchNext);
    dom.searchPrev.addEventListener('click', searchPrev);
    dom.searchClear.addEventListener('click', clearSearch);

    // Theme
    V.Theme.init();

    // File browser (folder open + sidebar) — optional module
    if (V.FileBrowser && typeof V.FileBrowser.init === 'function') {
      V.FileBrowser.init();
    }

    // Drag & drop
    setupDragDrop();

    // Keyboard
    setupKeyboard();
  }

  // ── Init ──────────────────────────────────────────────────────────
  function init() {
    cacheDom();
    bindEvents();
    showEmpty();

    // Check if a file was dropped on the window before init
    // (handled by drag-drop setup)
  }

  // Boot when DOM is ready
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }

  // Public surface used by js/filebrowser.js to hand off text read via the
  // File System Access API (which has no FileReader step of its own).
  window.JSONLViewer.App = {
    loadText: loadText,
    showLoading: showLoading,
  };
})();

</script>
</body>
</html>
