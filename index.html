<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Code — Conversation Viewer</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github-dark.min.css" id="hljs-theme">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>📜</text></svg>">
</head>
<body>

<!-- Header -->
<header class="app-header">
  <div class="header-left">
    <span class="app-logo">📜</span>
    <span class="app-name">Claude Code Viewer</span>
  </div>

  <div class="header-center">
    <div class="search-box" id="searchContainer">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="searchInput" class="search-input" placeholder="Search conversation…" disabled>
      <span class="search-meta" id="searchMeta"></span>
      <button class="search-nav-btn" id="searchPrev" title="Previous match (Shift+Enter)" disabled>↑</button>
      <button class="search-nav-btn" id="searchNext" title="Next match (Enter)" disabled>↓</button>
      <button class="search-clear-btn" id="searchClear" title="Clear search" style="display:none">✕</button>
    </div>
  </div>

  <div class="header-right">
    <button class="header-btn" id="btnUpload" title="Open JSONL file">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      <span class="btn-label">Open</span>
    </button>

    <button class="header-btn" id="btnOpenFolder" title="Open a folder of sessions (Chrome/Edge only)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V7z"/></svg>
      <span class="btn-label">Open Folder</span>
    </button>

    <div class="export-dropdown">
      <button class="header-btn" id="btnExport" title="Export conversation" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        <span class="btn-label">Export</span>
      </button>
      <div class="dropdown-menu" id="exportMenu">
        <button data-format="md">Export as Markdown (.md)</button>
        <button data-format="pdf">Export as PDF (.pdf)</button>
        <button data-format="dxt">Export as DXT (.dxt)</button>
      </div>
    </div>

    <button class="header-btn" id="btnTheme" title="Toggle dark/light mode">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="themeIconLight"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="themeIconDark" style="display:none"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
    </button>
  </div>
</header>

<!-- Session info bar -->
<div class="session-bar" id="sessionBar" style="display:none">
  <span class="session-model" id="sessionModel"></span>
  <span class="session-stats" id="sessionStats"></span>
  <span class="session-file" id="sessionFile"></span>
</div>

<!-- Main content -->
<main class="app-main" id="appMain">
  <!-- Session sidebar (shown once a folder is opened) -->
  <aside class="session-sidebar" id="sessionSidebar" style="display:none">
    <div class="sidebar-header">
      <span class="sidebar-title">Sessions</span>
      <button class="sidebar-toggle" id="btnSidebarToggle" title="Collapse sidebar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
    </div>
    <div class="sidebar-list" id="sidebarList"></div>
  </aside>

  <div class="main-content" id="mainContent">
    <!-- Empty state -->
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">
        <svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M32 8v36M20 36l12 12 12-12"/>
          <path d="M16 16h32a4 4 0 014 4v24a4 4 0 01-4 4H16a4 4 0 01-4-4V20a4 4 0 014-4z"/>
        </svg>
      </div>
      <h2>Open a Claude Code conversation</h2>
      <p>Drag and drop a <code>.jsonl</code> file here, or click to browse.</p>
      <button class="btn-primary" id="btnUploadEmpty">Choose File</button>
      <button class="btn-secondary" id="btnOpenFolderEmpty">Open the whole projects folder</button>
      <p class="empty-hint">Your conversation files are in <code>~/.claude/projects/</code></p>
    </div>

    <!-- Chat container -->
    <div class="chat-container" id="chatContainer" style="display:none">
      <div class="chat-messages" id="chatMessages"></div>
    </div>

    <!-- Loading state -->
    <div class="loading-state" id="loadingState" style="display:none">
      <div class="spinner"></div>
      <p>Parsing conversation…</p>
    </div>
  </div>
</main>

<!-- Hidden file input -->
<input type="file" id="fileInput" accept=".jsonl" style="display:none">

<!-- Toast container -->
<div class="toast-container" id="toastContainer"></div>

<!-- Export filter modal -->
<div class="modal-overlay" id="exportFilterModal" style="display:none">
  <div class="modal-dialog">
    <div class="modal-header">
      <h3>Export as <span id="exportFormatLabel">Markdown</span></h3>
    </div>
    <p class="modal-desc">Choose what to include in the export:</p>
    <div class="filter-presets">
      <button class="btn-preset" id="btnPresetAll" type="button">Everything</button>
      <button class="btn-preset" id="btnPresetConvo" type="button">Conversation only</button>
    </div>
    <div class="filter-options">
      <label class="filter-row">
        <input type="checkbox" data-filter="text" checked>
        <span class="filter-label">💬 Text messages</span>
      </label>
      <label class="filter-row">
        <input type="checkbox" data-filter="thinking" checked>
        <span class="filter-label">💭 Thinking blocks</span>
      </label>
      <label class="filter-row">
        <input type="checkbox" data-filter="read" checked>
        <span class="filter-label">📖 Read</span>
      </label>
      <label class="filter-row">
        <input type="checkbox" data-filter="write" checked>
        <span class="filter-label">✏️ Write</span>
      </label>
      <label class="filter-row">
        <input type="checkbox" data-filter="edit" checked>
        <span class="filter-label">📝 Edit</span>
      </label>
      <label class="filter-row">
        <input type="checkbox" data-filter="commands" checked>
        <span class="filter-label">💻 Commands <span class="filter-hint">(Bash, PowerShell)</span></span>
      </label>
      <label class="filter-row">
        <input type="checkbox" data-filter="otherTools" checked>
        <span class="filter-label">🔧 Other tools <span class="filter-hint">(Glob, Grep, etc.)</span></span>
      </label>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" id="btnExportCancel">Cancel</button>
      <button class="btn-export-modal" id="btnExportConfirm">Export</button>
    </div>
  </div>
</div>

<!-- Scripts --><script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/15.0.12/marked.min.js"></script>
<script src="js/theme.js"></script>
<script src="js/parser.js"></script>
<script src="js/search.js"></script>
<script src="js/exporter.js"></script>
<script src="js/renderer.js"></script>
<script src="js/filebrowser.js"></script>
<script src="js/app.js"></script>
</body>
</html>
